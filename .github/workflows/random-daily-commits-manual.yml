name: Random Daily Commits (Manual)

on:
  workflow_dispatch:

concurrency:
  group: random-daily-commits
  cancel-in-progress: false

jobs:
  make-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine commit count
        id: calc-commits
        run: |
          TODAY_IST=$(TZ=Asia/Kolkata date +%F)
          LAST_DATE=""
          if [ -f .last_commit_date ]; then
            LAST_DATE=$(cat .last_commit_date)
          fi

          if [ "$TODAY_IST" = "$LAST_DATE" ]; then
            echo "Commits for IST date $TODAY_IST already exist. Skipping."
            echo "count=0" >> $GITHUB_OUTPUT
            echo "today_ist=$TODAY_IST" >> $GITHUB_OUTPUT
            echo "should_commit=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_COUNT=0
          if [ -f .last_commit_count ]; then
            LAST_COUNT=$(cat .last_commit_count)
          fi

          NEW_COUNT=$(( RANDOM % 15 + 6 ))
          while [ "$NEW_COUNT" -eq "$LAST_COUNT" ]; do
            NEW_COUNT=$(( RANDOM % 15 + 6 ))
          done

          echo "Commits to make today: $NEW_COUNT (yesterday was $LAST_COUNT)"
          echo "count=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "today_ist=$TODAY_IST" >> $GITHUB_OUTPUT
          echo "should_commit=true" >> $GITHUB_OUTPUT

      - name: Create commits
        if: steps.calc-commits.outputs.should_commit == 'true'
        run: |
          COUNT=${{ steps.calc-commits.outputs.count }}
          TODAY_IST=${{ steps.calc-commits.outputs.today_ist }}
          for i in $(seq 1 $COUNT)
          do
            if [ "$i" -eq 1 ]; then
              echo "$COUNT" > .last_commit_count
              echo "$TODAY_IST" > .last_commit_date
            fi
            echo "Commit $i of $COUNT on IST day $TODAY_IST at $(date -u +%FT%TZ)" >> .daily_commit_log
            git add .daily_commit_log .last_commit_count .last_commit_date
            git commit -m "chore: automated random daily commit $i"
          done

      - name: Push commits
        if: steps.calc-commits.outputs.should_commit == 'true'
        run: git push

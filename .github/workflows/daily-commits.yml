name: Daily Commits

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual triggering

jobs:
  make-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create 10 commits
        run: |
          for i in {1..10}
          do
            echo "Commit $i on $(date)" >> .daily_commit_log
            git add .daily_commit_log
            git commit -m "chore: automated daily commit $i"
          done

      - name: Push commits
        run: git push
